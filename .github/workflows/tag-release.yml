name: Auto Tagging

on:
  pull_request:
    branches:
      - main
      - feature/**
      - release/**
      - bugfix/**
      - hotfix/**

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Obter última tag ou criar inicial
        id: last_tag
        run: |
          TAG=$(git tag --list --sort=-v:refname | grep -E '^(dev-)?[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$' | sed 's/^dev-//' | head -n 1)

          if [[ -z "$TAG" ]]; then
            TAG="0.0.0"
            echo "Nenhuma tag encontrada. Criando tag inicial: $TAG"
            git tag "$TAG"
            git push origin "$TAG"
          fi

          echo "Última tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_ENV

      - name: Determinar novo número de versão
        id: new_tag
        run: |
          OLD_TAG="${{ env.tag }}"
          IFS='.' read -r -a VERSION <<< "$OLD_TAG"

          # Se a tag inicial for 0.0.0, adicionamos o nível 4 ao primeiro incremento
          if [[ "$OLD_TAG" == "0.0.0" ]]; then
            VERSION+=(0)
          fi

          # Verifica se a TAG foi dividida corretamente
          if [[ ${#VERSION[@]} -lt 3 ]]; then
            echo "Erro: A tag antiga ($OLD_TAG) não foi interpretada corretamente."
            exit 1
          fi

          BRANCH="${GITHUB_HEAD_REF}"
          PREFIX=""

          if [[ "$BRANCH" == feature/* ]]; then
            # Feature -> Incrementa nível 4 (com "-") e adiciona prefixo "dev-"
            if [[ ${#VERSION[@]} -eq 3 ]]; then
              VERSION+=(1)  # Se não existir nível 4, cria
            else
              VERSION[3]=$((VERSION[3] + 1))
            fi
            PREFIX="dev-"
          elif [[ "$BRANCH" == release/* ]]; then
            # Release -> Incrementa nível 2, zera níveis 3 e 4
            VERSION[1]=$((VERSION[1] + 1))
            VERSION[2]=0
            VERSION[3]=0
          elif [[ "$BRANCH" == bugfix/* || "$BRANCH" == hotfix/* ]]; then
            # Bugfix/Hotfix -> Incrementa nível 3, zera nível 4
            VERSION[2]=$((VERSION[2] + 1))
            VERSION[3]=0
          else
            echo "Branch não suportada para tagging automática."
            exit 1
          fi

          # Se o nível 4 existe, usa "-", caso contrário, não adiciona
          if [[ ${#VERSION[@]} -eq 4 ]]; then
            NEW_TAG="${PREFIX}${VERSION[0]}.${VERSION[1]}.${VERSION[2]}-${VERSION[3]}"
          else
            NEW_TAG="${PREFIX}${VERSION[0]}.${VERSION[1]}.${VERSION[2]}"
          fi

          echo "Nova tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_ENV

      - name: Criar e enviar nova tag
        run: |
          # Incrementa a última parte da tag de maneira adequada
          TAG_NAME="${{ env.new_tag }}"
          
          # Verifica se a tag já existe, caso contrário, cria a nova tag
          git tag "$TAG_NAME" || true
          git push origin "$TAG_NAME"
