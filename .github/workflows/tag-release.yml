name: Automatic Versioning (Push & PRs to X Branches)

on:
  pull_request:
    branches:
      - "[0-9]+X"  # Padrão para qualquer branch tipo "1X", "2X", "10X", etc.
    types:
      - closed
  push:
    branches:
      - "[0-9]+X"  # Aceita pushes diretos para qualquer versão major

jobs:
  tag:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permite criar tags

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Obter última versão
        id: get_version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV

      - name: Determinar tipo de versão
        id: versioning
        run: |
          BUMP="minor"  # Padrão
          LAST_VERSION="${{ env.LAST_TAG }}"
          TARGET_BRANCH="${{ github.ref_name }}"  # Pega a branch de destino
          MAJOR_VERSION=$(echo "$TARGET_BRANCH" | grep -o '^[0-9]*')  # Extrai a major da branch

          # Se for push, pega a branch e commit
          if [[ "${{ github.event_name }}" == "push" ]]; then
            SOURCE_BRANCH="${{ github.ref_name }}"
            COMMIT_MSG=$(git log --format=%B -n 1 ${{ github.sha }})
          else
            # Se for PR, pega a branch de origem e título da PR
            SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
            COMMIT_MSG="${{ github.event.pull_request.title }}"
          fi

          # Se a branch é hotfix ou bugfix, é patch
          if [[ "$SOURCE_BRANCH" =~ ^(hotfix/|bugfix/) ]]; then
            BUMP="patch"
          fi

          # Permitir #major ou #minor na mensagem da PR ou do commit
          if [[ "$COMMIT_MSG" =~ "#major" ]]; then
            BUMP="major"
          elif [[ "$COMMIT_MSG" =~ "#minor" ]]; then
            BUMP="minor"
          fi

          echo "BUMP=$BUMP" >> $GITHUB_ENV
          echo "MAJOR_VERSION=$MAJOR_VERSION"

      - name: Criar e publicar nova tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.67.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ env.BUMP }}
          RELEASE_BRANCHES: ${{ github.ref_name }}
          WITH_V: false
