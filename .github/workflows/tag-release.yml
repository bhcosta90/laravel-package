name: Auto Tagging

on:
  pull_request:
    branches:
      - main
      - release/**

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Obter última tag ou criar inicial
        id: last_tag
        run: |
          TAG=$(git tag --list --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+$' | head -n 1)

          if [[ -z "$TAG" ]]; then
            TAG="0.0.0-0"
            echo "Nenhuma tag encontrada. Criando tag inicial: $TAG"
            git tag "$TAG"
            git push origin "$TAG"
          fi

          echo "Última tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_ENV

      - name: Determinar novo número de versão
        id: new_tag
        run: |
          OLD_TAG="${{ env.tag }}"
          IFS='.-' read -r -a VERSION <<< "$OLD_TAG"

          # Verifica se a TAG foi dividida corretamente
          if [[ ${#VERSION[@]} -ne 4 ]]; then
            echo "Erro: A tag antiga ($OLD_TAG) não foi interpretada corretamente."
            exit 1
          fi

          BRANCH="${GITHUB_HEAD_REF}"

          if [[ "$BRANCH" == feature/* ]]; then
            # Feature -> Incrementa nível 4 (com "-")
            VERSION[3]=$((VERSION[3] + 1))
          elif [[ "$BRANCH" == release/* ]]; then
            # Release -> Incrementa nível 2, zera níveis 3 e 4
            VERSION[1]=$((VERSION[1] + 1))
            VERSION[2]=0
            VERSION[3]=0
          elif [[ "$BRANCH" == bugfix/* || "$BRANCH" == hotfix/* ]]; then
            # Bugfix/Hotfix -> Incrementa nível 3, zera nível 4
            VERSION[2]=$((VERSION[2] + 1))
            VERSION[3]=0
          else
            echo "Branch não suportada para tagging automática."
            exit 1
          fi

          NEW_TAG="${VERSION[0]}.${VERSION[1]}.${VERSION[2]}-${VERSION[3]}"
          echo "Nova tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_ENV

      - name: Criar e enviar nova tag
        run: |
          git tag "${{ env.new_tag }}"
          git push origin "${{ env.new_tag }}"
