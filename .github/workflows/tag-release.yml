name: Automatic Versioning (PRs to Main)

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  tag:
    if: github.event.pull_request.merged == true  # Só executa se a PR foi mergeada
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permite criar tags

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Obter última versão
        id: get_version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV

      - name: Determinar tipo de versão
        id: versioning
        run: |
          BUMP="patch"  # Padrão
          LAST_VERSION="${{ env.LAST_TAG }}"
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"  # Branch de origem da PR
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Se o título da PR contém #major ou #minor, prioriza isso
          if [[ "$PR_TITLE" =~ "#major" ]]; then
            BUMP="major"
          elif [[ "$PR_TITLE" =~ "#minor" ]]; then
            BUMP="minor"
          elif [[ "$SOURCE_BRANCH" =~ ^(bugfix/|hotfix/) ]]; then
            BUMP="patch"  # Se a branch de origem for bugfix ou hotfix, o incremento é PATCH
          else
            # Define o tipo de versão com base na branch de origem
            if [[ "$SOURCE_BRANCH" =~ ^release/ ]]; then
              BUMP="major"
            elif [[ "$SOURCE_BRANCH" =~ ^feature/ ]]; then
              BUMP="minor"
            fi
          fi

          echo "BUMP=$BUMP" >> $GITHUB_ENV

      - name: Criar e publicar nova tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.67.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ env.BUMP }}
          RELEASE_BRANCHES: main
          WITH_V: false
