name: Auto Tag on Merge

on:
  pull_request:
    types:
      - closed  # Ação será executada quando o PR for mesclado

jobs:
  tag:
    if: github.event.pull_request.merged == true  # Garante que o PR foi realmente mesclado
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"

      - name: Obter a última tag limpa
        id: last_tag
        run: |
          # Obtém a última tag, se não houver define como '0.0.0'
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '0.0.0')

          # Remove prefixos e sufixos (ex: 'dev-', 'release-', 'build-', '-1', '-alpha', etc.)
          LAST_TAG=$(echo "$LAST_TAG" | sed -E 's/^(dev-|release-|build-)//' | sed -E 's/(-[0-9]+)$//')

          # Garante que a tag tenha formato 'X.Y.Z'
          LAST_TAG="${LAST_TAG//[^0-9.]/}"
          LAST_TAG="${LAST_TAG:-0.0.0}"

          # Extrai MAJOR, MINOR e PATCH
          MAJOR=$(echo "$LAST_TAG" | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | cut -d. -f3)

          # Se MINOR ou PATCH estiverem vazios, define como 0
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV
          echo "MAJOR=$MAJOR" >> $GITHUB_ENV
          echo "MINOR=$MINOR" >> $GITHUB_ENV
          echo "PATCH=$PATCH" >> $GITHUB_ENV

          echo "Última tag limpa: $LAST_TAG"
          echo "MAJOR=$MAJOR, MINOR=$MINOR, PATCH=$PATCH"

      - name: Gerar nova versão com base no nome do branch
        id: version
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"  # Nome do branch do PR
          NEW_TAG=""

          # Garantir que as variáveis MAJOR, MINOR e PATCH sejam inteiros
          MAJOR=$((MAJOR))
          MINOR=$((MINOR))
          PATCH=$((PATCH))

          if [[ "$BRANCH_NAME" =~ ^release/ ]]; then
              ((MAJOR++))
              MINOR=0
              PATCH=0
              NEW_TAG="$MAJOR.$MINOR.$PATCH"
          elif [[ "$BRANCH_NAME" =~ ^(feature/feat/) ]]; then
              ((MINOR++))
              PATCH=0
              NEW_TAG="$MAJOR.$MINOR.$PATCH"
          elif [[ "$BRANCH_NAME" =~ ^(hotfix/|bugfix/) ]]; then
              ((PATCH++))
              NEW_TAG="$MAJOR.$MINOR.$PATCH"
          fi

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "🔖 Nova tag gerada: $NEW_TAG"

      - name: Criar e enviar a tag
        run: |
          git tag $NEW_TAG
          git push origin $NEW_TAG
