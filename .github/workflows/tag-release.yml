name: Automatic Versioning (Push & PRs to X/x Branches)

on:
  pull_request:
    branches:
      - "[0-9]+[Xx]"  # Aceita "1X", "2x", "10X", etc.
    types:
      - closed

jobs:
  tag:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permite criar tags

    steps:
      - name: Checkout do cÃģdigo
        uses: actions/checkout@v4

      - name: Obter Ãšltima versÃĢo
        id: get_version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV

      - name: Determinar tipo de versÃĢo
        id: versioning
        run: |
          LAST_VERSION="${{ env.LAST_TAG }}"
          TARGET_BRANCH="${{ github.ref_name }}"  # Pega a branch de destino
          MAJOR_VERSION=$(echo "$TARGET_BRANCH" | grep -o '^[0-9]*')  # Extrai a major da branch

          # Extrai os nÃšmeros da versÃĢo existente
          MAJOR=$(echo "$LAST_VERSION" | cut -d. -f1)
          MINOR=$(echo "$LAST_VERSION" | cut -d. -f2)
          PATCH=$(echo "$LAST_VERSION" | cut -d. -f3)
          BUILD=$(echo "$LAST_VERSION" | cut -d. -f4)

          # Se for push, pega a branch e commit
          if [[ "${{ github.event_name }}" == "push" ]]; then
            SOURCE_BRANCH="${{ github.ref_name }}"
            COMMIT_MSG=$(git log --format=%B -n 1 ${{ github.sha }})
          else
            # Se for PR, pega a branch de origem e tÃ­tulo da PR
            SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
            COMMIT_MSG="${{ github.event.pull_request.title }}"
          fi

          # Definir o nÃ­vel correto da versÃĢo
          if [[ "$SOURCE_BRANCH" =~ ^feature/ ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUILD=0
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"  # Remove o BUILD
          elif [[ "$SOURCE_BRANCH" =~ ^(hotfix/|bugfix/) ]]; then
            PATCH=$((PATCH + 1))
            BUILD=0
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"  # Remove o BUILD
          else
            BUILD=$((BUILD + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH.$BUILD"  # MantÃĐm o BUILD
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Gerando nova versÃĢo: $NEW_VERSION"

      - name: Criar e publicar nova tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.67.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUSTOM_TAG: ${{ env.NEW_VERSION }}
          RELEASE_BRANCHES: ${{ github.ref_name }}
          WITH_V: false
