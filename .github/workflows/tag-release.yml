name: Auto Tagging

on:
  pull_request:
    branches:
      - main
      - release/**

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cĂłdigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Obter Ăşltima tag ou criar inicial
        id: last_tag
        run: |
          TAG=$(git tag --list --sort=-v:refname | grep -E '^(dev-)?[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$' | sed 's/^dev-//' | head -n 1)

          if [[ -z "$TAG" ]]; then
            TAG="0.0.0"
            echo "Nenhuma tag encontrada. Criando tag inicial: $TAG"
            git tag "$TAG"
            git push origin "$TAG"
          fi

          echo "Ăšltima tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_ENV

      - name: Determinar novo nĂşmero de versĂŁo
        id: new_tag
        run: |
          OLD_TAG="${{ env.tag }}"
          IFS='.' read -r -a VERSION <<< "$OLD_TAG"

          if [[ "$OLD_TAG" == "0.0.0" ]]; then
            VERSION+=(0)
          fi

          if [[ ${#VERSION[@]} -lt 3 ]]; then
            echo "Erro: A tag antiga ($OLD_TAG) nĂŁo foi interpretada corretamente."
            exit 1
          fi

          BRANCH="${GITHUB_HEAD_REF}"
          PREFIX=""
          LAST_PART=""

          if [[ "$BRANCH" == feature/* ]]; then
            if [[ ${#VERSION[@]} -eq 3 ]]; then
              VERSION+=(1)
            else
              VERSION[3]=$((VERSION[3] + 1))
            fi
            PREFIX="dev-"
          elif [[ "$BRANCH" == release/* ]]; then
            VERSION[1]=$((VERSION[1] + 1))
            VERSION[2]=0
            VERSION[3]=0
          elif [[ "$BRANCH" == bugfix/* || "$BRANCH" == hotfix/* ]]; then
            VERSION[2]=$((VERSION[2] + 1))
            VERSION[3]=0
          else
            echo "Branch nĂŁo suportada para tagging automĂˇtica."
            exit 1
          fi

          # Verifica se jĂˇ existe uma tag com o mesmo nĂşmero base e adiciona um sufixo incremental
          BASE_TAG="${PREFIX}${VERSION[0]}.${VERSION[1]}.${VERSION[2]}-${VERSION[3]}"
          EXISTING_TAGS=$(git tag --list "${BASE_TAG}*" | sort -V | tail -n 1)

          if [[ -n "$EXISTING_TAGS" ]]; then
            LAST_PART=$(echo "$EXISTING_TAGS" | grep -oE '[0-9]+$')
            LAST_PART=$((LAST_PART + 1))
            BASE_TAG="${PREFIX}${VERSION[0]}.${VERSION[1]}.${VERSION[2]}-${LAST_PART}"
          else
            LAST_PART=1
          fi

          NEW_TAG="${BASE_TAG}-${LAST_PART}"

          echo "Nova tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_ENV

      - name: Criar e enviar nova tag
        run: |
          git tag "${{ env.new_tag }}"
          git push origin "${{ env.new_tag }}"
