name: Auto Tagging

on:
  pull_request:
    branches:
      - main
      - feature/**
      - release/**
      - bugfix/**
      - hotfix/**

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Obter última tag ou criar inicial
        id: last_tag
        run: |
          TAG=$(git tag --list --sort=-v:refname | grep -E '^(dev-)?[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$' | sed 's/^dev-//' | head -n 1)

          if [[ -z "$TAG" ]]; then
            TAG="0.0.0"
            echo "Nenhuma tag encontrada. Criando tag inicial: $TAG"
            git tag "$TAG"
            git push origin "$TAG"
          fi

          echo "Última tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_ENV

      - name: Determinar novo número de versão
        id: new_tag
        run: |
          OLD_TAG="${{ env.tag }}"
          IFS='.' read -r -a VERSION <<< "$OLD_TAG"

          # Se a tag inicial for 0.0.0, adicionamos o nível 4 ao primeiro incremento
          if [[ "$OLD_TAG" == "0.0.0" ]]; then
            VERSION+=(0)
          fi

          BRANCH="${GITHUB_HEAD_REF}"
          PREFIX=""
          TAG_SUFFIX=""

          if [[ "$BRANCH" == feature/* ]]; then
            # Feature -> Incrementa nível 4 e adiciona prefixo "dev-"
            if [[ ${#VERSION[@]} -eq 3 ]]; then
              VERSION+=(0)  # Se não existir nível 4, inicia com 0
            fi
            PREFIX="dev-"

            # Verifica se a tag já existe e adiciona contador extra se necessário
            BASE_TAG="${PREFIX}${VERSION[0]}.${VERSION[1]}.${VERSION[2]}"
            COUNT=$((VERSION[3] + 1))

            while git tag --list | grep -q "^${BASE_TAG}-${COUNT}$"; do
              COUNT=$((COUNT + 1))
            done

            TAG_SUFFIX="-$COUNT"

          elif [[ "$BRANCH" == release/* ]]; then
            # Release -> Incrementa nível 2, zera níveis 3 e 4
            VERSION[1]=$((VERSION[1] + 1))
            VERSION[2]=0
            VERSION[3]=0
          elif [[ "$BRANCH" == bugfix/* || "$BRANCH" == hotfix/* ]]; t
