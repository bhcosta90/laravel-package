name: Auto Tag Release

on:
  push:
    branches:
      - "**"  # Captura qualquer branch

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"

      - name: Obter última tag
        id: last_tag
        run: echo "LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '0.0.0')" >> $GITHUB_ENV

      - name: Extrair versão semântica
        id: version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG//[^0-9.]/}"
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)

          if [[ "$BRANCH_NAME" == feature/* || "$BRANCH_NAME" == feat/* ]]; then
              ((MINOR++))
              PATCH=0
              NEW_TAG="$MAJOR.$MINOR.$PATCH"
          elif [[ "$BRANCH_NAME" == hotfix/* || "$BRANCH_NAME" == bugfix/* ]]; then
              ((PATCH++))
              NEW_TAG="$MAJOR.$MINOR.$PATCH"
          else
              BUILD_NUMBER=$(git tag --list "$MAJOR.$MINOR.$PATCH-build.*" | wc -l)
              NEW_TAG="dev-$MAJOR.$MINOR.$PATCH-$((BUILD_NUMBER + 1))"
          fi

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "🔖 Nova tag gerada: $NEW_TAG"

      - name: Criar e enviar a tag
        run: |
          git tag $NEW_TAG
          git push origin $NEW_TAG
